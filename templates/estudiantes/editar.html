{% extends 'base.html' %}
{% block title %}Editar Estudiante{% endblock %}

{% block content %}
<h2>Editar Estudiante</h2>

<form method="POST">
    <!-- Nombre -->
    <label for="nombre">Nombre:</label>
    <input type="text" name="nombre" value="{{ estudiante.nombre }}" required>

    <!-- Apellido -->
    <label for="apellido">Apellido:</label>
    <input type="text" name="apellido" value="{{ estudiante.apellido }}" required>

    <!-- Documento -->
    <label for="documento">Documento:</label>
    <input type="text" name="documento" value="{{ estudiante.documento }}" required>

    <!-- Programa -->
    <label for="id_programa">ID Programa:</label>
    <input type="number" name="id_programa" value="{{ estudiante.id_programa }}" required>

    <!-- Semestre actual -->
    <label for="semestre_actual">Semestre Actual:</label>
    <input type="number" name="semestre_actual" value="{{ estudiante.semestre_actual }}" required>

    <!-- Estado -->
    <label for="estado">Estado:</label>
    <input type="text" name="estado" value="{{ estudiante.estado }}" required>

    <button type="submit">Guardar Cambios</button>
</form>
{% endblock %}
