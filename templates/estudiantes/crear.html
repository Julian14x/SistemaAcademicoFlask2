{% extends 'base.html' %}
{% block title %}Crear Estudiante{% endblock %}

{% block content %}
<h2>Crear Estudiante</h2>

<form method="POST">
    <!-- Nombre -->
    <label for="nombre">Nombre:</label>
    <input type="text" name="nombre" required>

    <!-- Apellido -->
    <label for="apellido">Apellido:</label>
    <input type="text" name="apellido" required>

    <!-- Documento -->
    <label for="documento">Documento:</label>
    <input type="text" name="documento" required>

    <!-- Programa -->
    <label for="id_programa">ID Programa:</label>
    <input type="number" name="id_programa" required>

    <!-- Semestre actual -->
    <label for="semestre_actual">Semestre Actual:</label>
    <input type="number" name="semestre_actual" required>

    <!-- Estado -->
    <label for="estado">Estado:</label>
    <input type="text" name="estado" placeholder="Activo/Inactivo" required>

    <button type="submit">Guardar</button>
</form>
{% endblock %}
